<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidhu Moosewala Management Circus</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Georgia", serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #300000, #000000);
        color: #fff;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
            45deg,
            rgba(255, 0, 0, 0.05) 0px,
            rgba(255, 0, 0, 0.05) 10px,
            transparent 10px,
            transparent 20px
        );
        z-index: 0;
    }

    .container {
        text-align: center;
        z-index: 1;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 2.5rem;
        color: gold;
        text-shadow: 0 0 10px red, 0 0 20px red;
        margin-bottom: 30px;
        letter-spacing: 2px;
    }

    .image-container img {
        width: 280px;
        max-width: 80%;
        border-radius: 20px;
        box-shadow: 0 0 20px red;
        margin-bottom: 20px;
        animation: pulse 3s infinite ease-in-out;
    }

    .message {
        margin: 15px 0;
        font-size: 1.1rem;
        color: gold;
        text-shadow: 0 0 8px red;
        letter-spacing: 1px;
    }

    .timer {
        font-size: 1.6rem;
        letter-spacing: 3px;
        color: #ff4d4d;
        text-shadow: 0 0 8px red;
    }

    .labels {
        margin-top: 8px;
        font-size: 0.9rem;
        color: #aaa;
        letter-spacing: 2px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    @media (max-width: 600px) {
        h1 { font-size: 1.8rem; }
        .timer { font-size: 1.2rem; }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Sidhu Moosewala Management Circus</h1>

    <div class="image-container">
        <img src="image.png" alt="Circus Image">
    </div>

    <div class="message">
        Time passed After Sidhu fans did 10 million comments:
    </div>

    <div class="timer" id="timer"></div>

    <div class="labels">
        Months : Days : Hours : Minutes : Seconds
    </div>
</div>

<script>
function updateTimer() {
    const now = new Date();
    const currentYear = now.getFullYear();

    let startDate = new Date(currentYear, 2, 24);

    if (now < startDate) {
        startDate = new Date(currentYear - 1, 2, 24);
    }

    let diff = now - startDate;

    let seconds = Math.floor(diff / 1000);
    let minutes = Math.floor(seconds / 60);
    let hours = Math.floor(minutes / 60);
    let days = Math.floor(hours / 24);

    let months = Math.floor(days / 30);
    days = days % 30;

    hours = hours % 24;
    minutes = minutes % 60;
    seconds = seconds % 60;

    const format = (num) => num.toString().padStart(2, '0');

    document.getElementById("timer").innerText =
        `${format(months)} : ${format(days)} : ${format(hours)} : ${format(minutes)} : ${format(seconds)}`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
